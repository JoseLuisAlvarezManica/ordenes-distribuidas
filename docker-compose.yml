services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_NOTIFICATIONS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATIONS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NOTIFICATIONS_DB}
    volumes:
      - pg_data_notifications:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOTIFICATIONS_USER} -d ${POSTGRES_NOTIFICATIONS_DB}"]
      interval: 5s
      retries: 5

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
    volumes:
      - pg_data_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
      - rabbitmq_log:/var/log/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      writer-service:
        condition: service_started
      auth-service:
        condition: service_started

  auth-service:
    build: ./auth-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy

  writer-service:
    build: ./writer-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      telegram-bot:
        condition: service_started

  telegram-bot:
    build: ./telegram-bot
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  rabbitmq_log:
  pg_data_notifications:
  pg_data_auth:

