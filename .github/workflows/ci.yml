name: CI

on:
  push:
    branches: [features/QA]
  pull_request:
    branches: [features/QA]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: workflows
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          ENV_FILE=.env
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_NOTIFICATIONS_USER=${{ secrets.POSTGRES_NOTIFICATIONS_USER }}
          POSTGRES_NOTIFICATIONS_PASSWORD=${{ secrets.POSTGRES_NOTIFICATIONS_PASSWORD }}
          POSTGRES_NOTIFICATIONS_DB=${{ secrets.POSTGRES_NOTIFICATIONS_DB }}
          POSTGRES_NOTIFICATIONS_URL=${{ secrets.POSTGRES_NOTIFICATIONS_URL }}
          POSTGRES_AUTH_USER=${{ secrets.POSTGRES_AUTH_USER }}
          POSTGRES_AUTH_PASSWORD=${{ secrets.POSTGRES_AUTH_PASSWORD }}
          POSTGRES_AUTH_DB=${{ secrets.POSTGRES_AUTH_DB }}
          POSTGRES_AUTH_URL=${{ secrets.POSTGRES_AUTH_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          WRITER_SERVICE_URL=${{ secrets.WRITER_SERVICE_URL }}
          AUTH_SERVICE_URL=${{ secrets.AUTH_SERVICE_URL }}
          ANALYTICS_SERVICE_URL=${{ secrets.ANALYTICS_SERVICE_URL }}
          WRITER_TIMEOUT_SECONDS=${{ secrets.WRITER_TIMEOUT_SECONDS }}
          WRITER_MAX_RETRIES=${{ secrets.WRITER_MAX_RETRIES }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
          RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPPORT_NUMBER=${{ secrets.SUPPORT_NUMBER }}
          ANALYTICS_ADMIN_TOKEN=${{ secrets.ANALYTICS_ADMIN_TOKEN }}
          TELEGRAM_BOT_SERVICE_URL=${{ secrets.TELEGRAM_BOT_SERVICE_URL }}
          PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}
          PUBLIC_KEY=${{ secrets.PUBLIC_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          EOF

      - name: Install auth test dependencies
        run: pip install -r .github/workflows/test_auth/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check . --no-fix --exit-zero --output-format=full

      - name: Ruff format (check only)
        run: ruff format . --check --diff --verbose

      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env up --build -d

      - name: Wait for auth-service
        run: |
          timeout 180 bash -c '
            until curl -fsS http://localhost:8004/health > /dev/null; do
              echo "Esperando auth-service en puerto 8004..."
              sleep 5
            done
          '

      - name: Run auth workflow tests
        env:
          AUTH_TEST_BASE_URL: http://localhost:8004
          AUTH_TEST_DB_HOST: localhost
          AUTH_TEST_DB_PORT: "5435"
          AUTH_TEST_REDIS_HOST: localhost
          AUTH_TEST_REDIS_PORT: "6379"
          AUTH_TEST_REDIS_DB: "0"
        run: python -m unittest discover -s .github/workflows/test_auth -p "test_*.py" -v
      
      - name: Run analytics workflow tests
        run: python -m unittest discover -s .github/workflows/test_analytics -p "test_*.py" -v

      - name: Run orders workflow tests
        run: python -m unittest discover -s .github/workflows/test_orders -p "test_*.py" -v
      
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env logs --tail=200

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env down -v --remove-orphans

      