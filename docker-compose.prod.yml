services:
  postgres:
    restart: always

  postgres-notifications:
    restart: always
  
  postgres-auth:
    restart: always

  redis:
    restart: always

  rabbitmq:
    image: rabbitmq:4-alpine
    restart: always

  api-gateway:
    ports:
      - "80:8000"
    environment:
      LOG_LEVEL: WARNING
    restart: always
  writer-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  inventory-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  notification-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  telegram-bot:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M


  analytics-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M


